
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind '\' split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

# Claude Code agents mission control.
#   C-g (no prefix) -> floating command-palette popup: list + live preview,
#                      enter = go, tab = pin into the workspace, :q/esc = close.
bind -n C-g run-shell "$HOME/scripts/claude-dashboard.sh --popup"
# C-o (no prefix) -> resume ANY Claude conversation from any project dir
#                    (fzf popup, search by dir or title); survives moved or
#                    deleted worktrees. enter = resume with
#                    --dangerously-skip-permissions in a new window.
bind -n C-o run-shell "$HOME/scripts/claude-resume.sh --popup"
# C-t (no prefix) -> ⇄ port-forward menu (harpoon-style, like the ★ bookmarks).
#                    Two views, tab switches:
#                      ⇄ tunnels — 1-9/enter toggle a slot's tunnel on/off
#                      🌐 open    — lists slots whose port is actually answering
#                                  (tunnelled OR a plain local dev server);
#                                  1-9/enter opens http://localhost:PORT
#                    Both views: s stops that slot, ^a stops all, j/k move,
#                    + opens ad-hoc ports, d drops an ad-hoc entry, esc/q closes.
#                    Same state as the sketchybar ⇄ item.
bind -n C-t run-shell "$HOME/scripts/pf-menu.sh --popup"
# prefix b -> toggle a ★ bookmark on the conversation running in the CURRENT
#             pane (optional label popup). Find bookmarked ones in C-o + ctrl-f.
bind b run-shell "$HOME/scripts/claude-resume.sh --mark-pane '#{pane_id}'"
# prefix B -> the ★ bookmarks menu: 1-9 jump straight to that conversation,
#             j/k move, enter/l resume, d remove ★, h all convos, esc quit.
bind B run-shell "$HOME/scripts/claude-resume.sh --marks-popup"
# Inside the agents window, C-b toggles the navigator list; everywhere else it
# opens the ★ bookmarks menu. NOTE: this eats ctrl-b from the running app
# (vim page-up, Claude Code's background-task key) — remove the else-branch
# run-shell and restore `send-keys C-b` to give it back.
bind -n C-b if-shell -F '#{==:#{window_name},agents}' \
    'run-shell "$HOME/scripts/claude-agents-toggle-list.sh"' \
    'run-shell "$HOME/scripts/claude-resume.sh --quick-popup"'
# C-S-b -> ★ bookmark the current pane's conversation, same as prefix b.
# ctrl+shift+b is byte-identical to ctrl+b in classic terminal encoding, so
# kitty.conf maps it to the raw sequence \e[98;6u (send_text) and user-keys
# matches that sequence exactly — no extended-key decoding involved.
set -s user-keys[0] "\e[98;6u"
bind -n User0 run-shell "$HOME/scripts/claude-resume.sh --mark-pane '#{pane_id}'"
# also keep the native name in case the terminal speaks extended keys itself
bind -n C-S-b run-shell "$HOME/scripts/claude-resume.sh --mark-pane '#{pane_id}'"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'


#set size of pane
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z


set -g mouse on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane #


###########################
# Status Bar
###########################

# set refresh interval for status bar
set -g status-interval 5




# Allow tmux to set the titlebar.
set -g set-titles on


# Colors status bar
set -g status-style 'bg=default' # Set the background of the statusbar transparent.
set -g pane-active-border-style 'fg=magenta,bg=default' # Color of the active pane border.
set -g pane-border-style 'fg=brightblack,bg=default' # Color of the pane border.
# Commented out to use catppuccin window formatting
# set -g window-status-current-format '#[fg=magenta,bg=#1e1e2e] *#I #W' # Color of the active window in statusbar.
# use 256 term for pretty colors
set -sa terminal-overrides ',xterm*:sitm=\E[3m' # Enable italics
set -sa terminal-overrides ',screen-256color:RGB' # Enable italics
set -q -g status-utf8 on                        # expect UTF-8
setw -q -g utf8 on


# set status left bar
set -g status-left "#[fg=blue,bold,bg=#1e1e2e]  #S   "
set -g status-justify 'left'
set -g status-left-length 200
# set status right bar
set -g status-right-length 200
set -g status-position top
set -g status-right "#[fg=#b7befe,bold,bg=#1e1e2e]%a %Y-%m-%d 󱑒 %l:%M %p"
set -ga status-right "#($HOME/scripts/cal.sh)"


# increase scroll-back history
set -g history-limit 999999

# # use vim key bindings
# setw -g mode-keys vi

# Configure escape and focus
set-option -sg escape-time 10  # Faster command sequences
set-option -g focus-events on  # ?
set-option -sg repeat-time 600 # Increase repeat timeout

set -g base-index 0        # Start window index at 1
set -g renumber-windows on # Renumber windows when a window is closed.

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

set -g @catppuccin_flavor "mocha"
# Don't paint the status bar background — let it stay transparent so the
# terminal / Hyprland blur shows through instead of a solid purple bar.
set -g @catppuccin_status_background "none"
# Flat status design, same language as the CPU/RAM segment: icon + colored
# text straight on the transparent bar, no chip/pill backgrounds. "none"
# makes catppuccin leave window-status-format entirely to us.
set -g @catppuccin_window_status_style "none"

# Window tabs: index + folder name + live Claude-agent marker per tab
# (● working / ✓ waiting, count if >1, from claude-window-status.sh; empty
# for windows with no claude pane, refreshes on the status-interval).
# Current tab mauve + bold, the rest dimmed overlay grey.
set -g window-status-separator ""
set -g window-status-format "#[fg=#7f849c,bg=default] #I #(basename \"#{pane_current_path}\")#(~/scripts/claude-window-status.sh #{window_id}) "
set -g window-status-current-format "#[fg=#cba6f7,bold,bg=default] #I #(basename \"#{pane_current_path}\")#(~/scripts/claude-window-status.sh #{window_id}) "

# Right side, flat like sys-usage: session · date/time · CPU+RAM.
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#[fg=#89b4fa,bg=default,bold] #S#[fg=default,nobold]  "
set -ag status-right "#[fg=#b7befe,bg=default]󱑒 %a %d %b %H:%M#[fg=default]  "
# Live CPU + RAM usage (green -> yellow -> red as load climbs). Pairs with
# earlyoom: RAM goes red well before the 5% free floor where it starts killing.
set -ag status-right "#[bg=default]#(~/scripts/sys-usage.sh) "

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tpm'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# catppuccin paints popups solid (#1e1e2e); reset AFTER tpm so popups stay
# transparent and kitty/Hyprland blur shows through (C-o resume, C-g agents).
set -g popup-style 'bg=default,fg=default'

set -g allow-rename off
setw -g automatic-rename off
