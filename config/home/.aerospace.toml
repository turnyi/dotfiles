after-login-command = []
after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=2.0',
  'exec-and-forget sketchybar'
]

exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 20
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focus-changed            = ['move-mouse window-lazy-center']
on-focused-monitor-changed  = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 5
    inner.vertical   = 5
    outer.left       = 5
    outer.bottom     = 5
    # macOS already reserves the notch/menu-bar strip on the built-in display
    # (sketchybar draws inside it), so only a small gap is needed there.
    # External displays get bar height (32) + 5.
    outer.top        = [{ monitor.'built-in' = 5 }, 37]
    outer.right      = 5

# Workspace layout:
#  Primary monitor:   1=terminal  2=browser  3=notes  4=misc
#  Secondary monitor: 5=slack     6=discord  7=music  8=whatsapp  9=misc
[workspace-to-monitor-force-assignment]
    1 = 'primary'
    2 = 'primary'
    3 = 'primary'
    4 = 'primary'
    5 = 'secondary'
    6 = 'secondary'
    7 = 'secondary'
    8 = 'secondary'
    9 = 'secondary'

[mode.main.binding]
    # ── Layout ────────────────────────────────────────────────────────
    # alt+/ → tiles (auto-split direction, like Hyprland dwindle)
    # alt+, → accordion (stacked windows, cycle with alt+j/k)
    # alt+| → force horizontal split
    # alt+- → force vertical split
    alt-slash  = 'layout tiles horizontal vertical'
    alt-comma  = 'layout accordion horizontal vertical'
    alt-period = 'layout tiles horizontal'
    alt-minus  = 'layout tiles vertical'
    # alt+shift+space → center-master: focused window becomes the wide middle
    # column, the rest tile at the sides (external displays only)
    alt-shift-space = 'exec-and-forget bash ~/scripts/aerospace-center-master.sh'

    # ── Focus windows (vim keys, like Hyprland Super+hjkl) ──────────
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # ── Focus monitor ────────────────────────────────────────────────
    alt-p            = 'focus-monitor next --wrap-around'
    alt-shift-comma  = 'focus-monitor prev --wrap-around'
    alt-shift-period = 'focus-monitor next --wrap-around'

    # ── Move window (like Hyprland Super+Shift+HJKL) ─────────────────
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # ── Move window to monitor ────────────────────────────────────────
    alt-ctrl-shift-comma  = 'move-node-to-monitor prev --wrap-around --focus-follows-window'
    alt-ctrl-shift-period = 'move-node-to-monitor next --wrap-around --focus-follows-window'

    # ── Resize ───────────────────────────────────────────────────────
    alt-equal    = 'resize smart +50'
    alt-shift-r  = ['balance-sizes']

    # ── Window misc ───────────────────────────────────────────────────
    alt-i         = 'exec-and-forget bash ~/scripts/sketchybar-toggle.sh'
    alt-q         = 'close'
    alt-v         = 'layout floating tiling'
    alt-shift-f   = 'fullscreen'
    alt-tab       = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # ── Switch workspace (like Hyprland Super+1-9) ───────────────────
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    # ── Move window to workspace (like Hyprland Super+Shift+1-9) ─────
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'

    # ── Focus or launch apps (like Hyprland Super+letter) ────────────
    alt-t = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'kitty'"
    alt-b = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'Google Chrome' 'Personal'"
    alt-n = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'Google Chrome' 'Centinel'"
    alt-s = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'Slack'"
    alt-d = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'Discord'"
    alt-m = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'Spotify'"
    alt-w = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'WhatsApp'"
    alt-o = "exec-and-forget bash ~/scripts/focus-or-lunch.sh 'Obsidian'"

    # ── Open new window (like Hyprland Super+Shift+letter) ───────────
    alt-shift-t = "exec-and-forget open -na 'kitty'"
    alt-shift-b = "exec-and-forget open -na 'Google Chrome' --args --profile-directory='Profile 2'"
    alt-shift-n = "exec-and-forget open -na 'Google Chrome' --args --profile-directory='Profile 1'"
    alt-shift-s = "exec-and-forget open -na 'Slack'"
    alt-shift-d = "exec-and-forget open -na 'Discord'"
    alt-shift-m = "exec-and-forget open -na 'Spotify'"
    alt-shift-w = "exec-and-forget open -na 'WhatsApp'"
    alt-shift-o = "exec-and-forget open -na 'Obsidian'"

    # ── Modes ────────────────────────────────────────────────────────
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc       = ['reload-config', 'mode main']
    r         = ['flatten-workspace-tree', 'mode main']
    f         = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left',  'mode main']
    alt-shift-j = ['join-with down',  'mode main']
    alt-shift-k = ['join-with up',    'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    down       = 'volume down'
    up         = 'volume up'
    shift-down = ['volume mute-toggle', 'mode main']
    alt-shift-semicolon = 'mode main'

# ── Auto center-master on big displays ────────────────────────────────
# Re-arrange the workspace whenever a new window appears: main window in the
# middle, others at the sides. The script no-ops on the built-in display.
[[on-window-detected]]
check-further-callbacks = true
run = 'exec-and-forget bash ~/scripts/aerospace-center-master.sh --auto'

# ── App → workspace assignments ───────────────────────────────────────
[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Centinel'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Personal'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 6'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 7'

# WhatsApp Web (Chrome PWA)
[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.hnpfjngllnobngcgfapefoaidbinmjnm'
run = 'move-node-to-workspace 8'

[[on-window-detected]]
if.app-id = 'io.zsa.keymapp'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.webcatalog.switchbar'
run = 'layout floating'
